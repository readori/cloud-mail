name: 🚀 Deploy cloud-mail to Cloudflare Workers

on:
  push:
    branches: [ main ]
    paths:
      - "mail-worker/**"
      - "mail-vue/**"
  workflow_dispatch:
    inputs:
      force_deploy:
        description: '是否强制重新发布所有组件？(true/false)'
        required: false
        default: 'true'

jobs:
  Deploy-cloud-mail:
    name: 🏗️ Build and Deploy
    runs-on: ubuntu-latest

    env:
      NAME: ${{ secrets.NAME || vars.NAME || 'cloud-mail' }}
      CUSTOM_DOMAIN: ${{ secrets.CUSTOM_DOMAIN || vars.CUSTOM_DOMAIN }}
      DOMAIN: ${{ secrets.DOMAIN || vars.DOMAIN }}
      ADMIN: ${{ secrets.ADMIN || vars.ADMIN }}
      JWT_SECRET: ${{ secrets.JWT_SECRET || vars.JWT_SECRET }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || vars.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
      D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID || vars.D1_DATABASE_ID }}
      KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID || vars.KV_NAMESPACE_ID }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME || vars.R2_BUCKET_NAME }}
      PROJECT_LINK: ${{ secrets.PROJECT_LINK || vars.PROJECT_LINK }}
      AI_MODEL: ${{ secrets.AI_MODEL || vars.AI_MODEL || '@cf/meta/llama-3.1-8b-instruct' }}
      CLOUDFLARE_EMAIL: ${{ secrets.CF_EMAIL || vars.CF_EMAIL || false }}
      ANALYSIS_CACHE: ${{ secrets.ANALYSIS_CACHE || vars.ANALYSIS_CACHE || false }}
      LINUXDO_CLIENT_ID: ${{ secrets.LINUXDO_CLIENT_ID || vars.LINUXDO_CLIENT_ID }}
      LINUXDO_CLIENT_SECRET: ${{ secrets.LINUXDO_CLIENT_SECRET || vars.LINUXDO_CLIENT_SECRET }}
      LINUXDO_CALLBACK_URL: ${{ secrets.LINUXDO_CALLBACK_URL || vars.LINUXDO_CALLBACK_URL }}
      LINUXDO_SWITCH: ${{ secrets.LINUXDO_SWITCH || vars.LINUXDO_SWITCH }}

    outputs:
      worker_url: ${{ steps.deploy.outputs.worker_url }}

    steps:
      - name: 🚚 检出代码仓库 / Checkout repository
        uses: actions/checkout@v4

      - name: ⚙ 设置 pnpm / Set up pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: 9

      - name: ⚙ 设置 Node.js / Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: "./mail-worker/pnpm-lock.yaml"

      - name: 📦 安装依赖 / Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./mail-worker

      - name: 📡 禁用 Wrangler 遥测 / Disable wrangler telemetry
        working-directory: ./mail-worker
        run: pnpm wrangler telemetry disable

      - name: ⚡ 获取或创建 KV 数据库 / Get or create KV namespace
        working-directory: ./mail-worker
        id: kv_setup
        run: |
          if [ -n "$KV_NAMESPACE_ID" ]; then
            echo "kv_id=$KV_NAMESPACE_ID" >> $GITHUB_OUTPUT
          else
            echo "🔍 Checking KV namespace..."
            KV_LIST=$(pnpm wrangler kv namespace list)
            if echo "$KV_LIST" | jq -e ".[] | select(.title == \"$NAME\")" >/dev/null; then
              KV_ID=$(echo "$KV_LIST" | jq -r ".[] | select(.title == \"$NAME\") | .id")
            else
              pnpm wrangler kv namespace create $NAME
              KV_ID=$(pnpm wrangler kv namespace list | jq -r ".[] | select(.title == \"$NAME\") | .id")
            fi
            echo "kv_id=$KV_ID" >> $GITHUB_OUTPUT
          fi

      - name: 🐬 获取或创建 D1 数据库 / Get or create D1 database
        working-directory: ./mail-worker
        id: d1_setup
        run: |
          if [ -n "$D1_DATABASE_ID" ]; then
            echo "d1_id=$D1_DATABASE_ID" >> $GITHUB_OUTPUT
          else
            echo "🔍 Checking D1 database..."
            DB_LIST=$(pnpm wrangler d1 list --json)
            if echo "$DB_LIST" | jq -e ".[] | select(.name == \"$NAME\")" >/dev/null; then
              D1_ID=$(echo "$DB_LIST" | jq -r ".[] | select(.name == \"$NAME\") | .uuid")
            else
              pnpm wrangler d1 create $NAME
              D1_ID=$(pnpm wrangler d1 list --json | jq -r ".[] | select(.name == \"$NAME\") | .uuid")
            fi
            echo "d1_id=$D1_ID" >> $GITHUB_OUTPUT
          fi

      - name: 🛠️ 重新生成标准的 wrangler-action.toml / Generate config file
        working-directory: ./mail-worker
        run: |
          echo "📝 Generating wrangler-action.toml dynamically via Python..."
          python3 -c '
          import os, json

          # 基础配置
          toml = [
              f"name = \"{os.environ.get(\"NAME\")}\"",
              "main = \"src/index.js\"",
              "compatibility_date = \"2023-12-01\"",
              "",
              "[vars]",
              f"ADMIN = \"{os.environ.get(\"ADMIN\", \"\")}\"",
              f"JWT_SECRET = \"{os.environ.get(\"JWT_SECRET\", \"\")}\"",
              f"DOMAIN = {os.environ.get(\"DOMAIN\", \"[]\")}",
              f"AI_MODEL = \"{os.environ.get(\"AI_MODEL\", \"\")}\"",
              f"ANALYSIS_CACHE = {os.environ.get(\"ANALYSIS_CACHE\", \"false\").lower()}",
              ""
          ]

          # KV 和 D1 绑定
          toml.extend([
              "[[kv_namespaces]]",
              "binding = \"KV\"",
              f"id = \"{os.environ.get(\"KV_ID\", \"\")}\"",
              "",
              "[[d1_databases]]",
              "binding = \"DB\"",
              f"database_name = \"{os.environ.get(\"NAME\")}\"",
              f"database_id = \"{os.environ.get(\"D1_ID\", \"\")}\"",
              ""
          ])

          # 可选配置安全过滤（只有当变量真正存在且非空时才写入）
          custom_domain = os.environ.get("CUSTOM_DOMAIN")
          if custom_domain and custom_domain.strip():
              toml.extend(["[[routes]]", f"pattern = \"{custom_domain}\"", "custom_domain = true", ""])

          r2_bucket = os.environ.get("R2_BUCKET_NAME")
          if r2_bucket and r2_bucket.strip():
              toml.extend(["[[r2_buckets]]", "binding = \"R2\"", f"bucket_name = \"{r2_bucket}\"", ""])

          proj_link = os.environ.get("PROJECT_LINK")
          if proj_link and proj_link.strip():
              toml.extend(["[vars]", f"PROJECT_LINK = \"{proj_link}\"", ""])

          l_id = os.environ.get("LINUXDO_CLIENT_ID")
          l_sec = os.environ.get("LINUXDO_CLIENT_SECRET")
          if l_id and l_id.strip() and l_sec and l_sec.strip():
              toml.extend([
                  "[vars]",
                  f"LINUXDO_CLIENT_ID = \"{l_id}\"",
                  f"LINUXDO_CLIENT_SECRET = \"{l_sec}\"",
                  f"LINUXDO_CALLBACK_URL = \"{os.environ.get(\"LINUXDO_CALLBACK_URL\", \"\")}\"",
                  f"LINUXDO_SWITCH = {os.environ.get(\"LINUXDO_SWITCH\", \"false\").lower()}",
                  ""
              ])

          if os.environ.get("CLOUDFLARE_EMAIL", "").lower() == "true":
              toml.extend(["[[send_email]]", "name = \"email\"", ""])

          with open("wrangler-action.toml", "w", encoding="utf-8") as f:
              f.write("\n".join(toml))
          '
        env:
          KV_ID: ${{ steps.kv_setup.outputs.kv_id }}
          D1_ID: ${{ steps.d1_setup.outputs.d1_id }}

      - name: 🚀 开始部署 / Start deployment
        id: deploy
        working-directory: ./mail-worker
        run: |
          echo "🚀 Starting deployment..."
          if [ "${{ github.event.inputs.force_deploy }}" = "true" ]; then
            echo "🔄 Force deploy requested. Running no-cache deployment..."
            pnpm wrangler deploy -c wrangler-action.toml --no-bundle | tee deploy.log
          else
            pnpm wrangler deploy -c wrangler-action.toml | tee deploy.log
          fi
          
          WORKER_URL=$(grep -o "https://.*\.workers\.dev" deploy.log || echo "")
          if [ -n "$WORKER_URL" ]; then
            echo "::add-mask::$WORKER_URL"
          fi
          echo "worker_url=$WORKER_URL" >> $GITHUB_OUTPUT
          echo "✅ Deployment completed successfully."

      - name: ♻️ 初始化数据库 / Initialize database
        run: |
          echo "🛠️ Starting database initialization..."
          sleep 15
          WORKER_URL="${CUSTOM_DOMAIN:+https://$CUSTOM_DOMAIN}"
          WORKER_URL="${WORKER_URL:-${{ steps.deploy.outputs.worker_url }}}"
          if [ -z "$WORKER_URL" ]; then
            echo "❌ Preview URL not available. Please set CUSTOM_DOMAIN."
            exit 1
          fi
          
          HTTP_CODE=$(curl -sL -w "%{http_code}" -o response.txt "$WORKER_URL/api/init/${JWT_SECRET}")
          RESPONSE_BODY=$(cat response.txt)
          if [ "$RESPONSE_BODY" = "success" ]; then
            echo "✅ Setup completed."
          else
            echo "❌ Failed. HTTP: $HTTP_CODE, Response: $RESPONSE_BODY"
            exit 1
          fi

      - name: 🗑️ 删除运行记录 / Delete workflow runs
        uses: GitRML/delete-workflow-runs@main
        continue-on-error: true
        with:
          retain_days: '1'
          keep_minimum_runs: '0'
