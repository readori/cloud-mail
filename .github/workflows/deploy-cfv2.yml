name: 🚀 Deploy cloud-mail to Cloudflare Workers

on:
  push:
    branches: [ main ]
    paths:
      - "mail-worker/**"
      - "mail-vue/**"
  workflow_dispatch:
    inputs:
      force_deploy:
        description: '是否强制重新发布所有组件？(true/false)'
        required: false
        default: 'true'

jobs:
  Deploy-cloud-mail:
    name: 🏗️ Build and Deploy
    runs-on: ubuntu-latest

    env:
      NAME: ${{ secrets.NAME || vars.NAME || 'cloud-mail' }}
      CUSTOM_DOMAIN: ${{ secrets.CUSTOM_DOMAIN || vars.CUSTOM_DOMAIN }}
      DOMAIN: ${{ secrets.DOMAIN || vars.DOMAIN }}
      ADMIN: ${{ secrets.ADMIN || vars.ADMIN }}
      JWT_SECRET: ${{ secrets.JWT_SECRET || vars.JWT_SECRET }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || vars.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
      D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID || vars.D1_DATABASE_ID }}
      KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID || vars.KV_NAMESPACE_ID }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME || vars.R2_BUCKET_NAME }}
      PROJECT_LINK: ${{ secrets.PROJECT_LINK || vars.PROJECT_LINK }}
      AI_MODEL: ${{ secrets.AI_MODEL || vars.AI_MODEL || '@cf/meta/llama-3.1-8b-instruct' }}
      CLOUDFLARE_EMAIL: ${{ secrets.CF_EMAIL || vars.CF_EMAIL || false }}
      ANALYSIS_CACHE: ${{ secrets.ANALYSIS_CACHE || vars.ANALYSIS_CACHE || false }}
      LINUXDO_CLIENT_ID: ${{ secrets.LINUXDO_CLIENT_ID || vars.LINUXDO_CLIENT_ID }}
      LINUXDO_CLIENT_SECRET: ${{ secrets.LINUXDO_CLIENT_SECRET || vars.LINUXDO_CLIENT_SECRET }}
      LINUXDO_CALLBACK_URL: ${{ secrets.LINUXDO_CALLBACK_URL || vars.LINUXDO_CALLBACK_URL }}
      LINUXDO_SWITCH: ${{ secrets.LINUXDO_SWITCH || vars.LINUXDO_SWITCH }}
      # 以下为新补充的可选配置，均有合理默认值，一般不需要单独设置：
      ORM_LOG: ${{ secrets.ORM_LOG || vars.ORM_LOG || false }}
      COMPATIBILITY_DATE: ${{ secrets.COMPATIBILITY_DATE || vars.COMPATIBILITY_DATE || '2025-06-04' }}
      OBSERVABILITY_ENABLED: ${{ secrets.OBSERVABILITY_ENABLED || vars.OBSERVABILITY_ENABLED || 'true' }}
      # 多个 cron 用英文逗号分隔，例如 "0 16 * * *,*/30 * * * *"
      CRON_SCHEDULE: ${{ secrets.CRON_SCHEDULE || vars.CRON_SCHEDULE || '0 16 * * *' }}

    outputs:
      worker_url: ${{ steps.deploy.outputs.worker_url }}

    steps:
      - name: 🚚 检出代码仓库 / Checkout repository
        uses: actions/checkout@v4

      - name: ⚙ 设置 pnpm / Set up pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: 9

      - name: ⚙ 设置 Node.js / Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: "./mail-worker/pnpm-lock.yaml"

      - name: 📦 安装依赖 / Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./mail-worker

      - name: 📡 禁用 Wrangler 遥测 / Disable wrangler telemetry
        working-directory: ./mail-worker
        run: pnpm wrangler telemetry disable

      - name: ⚡ 获取或创建 KV 数据库 / Get or create KV namespace
        working-directory: ./mail-worker
        id: kv_setup
        run: |
          set -euo pipefail

          if [ -n "$KV_NAMESPACE_ID" ]; then
            echo "kv_id=$KV_NAMESPACE_ID" >> "$GITHUB_OUTPUT"
          else
            echo "🔍 Checking KV namespace..."
            KV_LIST=$(pnpm wrangler kv namespace list)
            if echo "$KV_LIST" | jq -e ".[] | select(.title == \"$NAME\")" >/dev/null; then
              KV_ID=$(echo "$KV_LIST" | jq -r ".[] | select(.title == \"$NAME\") | .id")
            else
              pnpm wrangler kv namespace create "$NAME"
              KV_ID=$(pnpm wrangler kv namespace list | jq -r ".[] | select(.title == \"$NAME\") | .id")
            fi

            if [ -z "$KV_ID" ]; then
              echo "❌ Failed to resolve KV namespace id."
              exit 1
            fi

            echo "kv_id=$KV_ID" >> "$GITHUB_OUTPUT"
          fi

      - name: 🐬 获取或创建 D1 数据库 / Get or create D1 database
        working-directory: ./mail-worker
        id: d1_setup
        run: |
          set -euo pipefail

          if [ -n "$D1_DATABASE_ID" ]; then
            echo "d1_id=$D1_DATABASE_ID" >> "$GITHUB_OUTPUT"
          else
            echo "🔍 Checking D1 database..."
            DB_LIST=$(pnpm wrangler d1 list --json)
            if echo "$DB_LIST" | jq -e ".[] | select(.name == \"$NAME\")" >/dev/null; then
              D1_ID=$(echo "$DB_LIST" | jq -r ".[] | select(.name == \"$NAME\") | .uuid")
            else
              pnpm wrangler d1 create "$NAME"
              D1_ID=$(pnpm wrangler d1 list --json | jq -r ".[] | select(.name == \"$NAME\") | .uuid")
            fi

            if [ -z "$D1_ID" ]; then
              echo "❌ Failed to resolve D1 database id."
              exit 1
            fi

            echo "d1_id=$D1_ID" >> "$GITHUB_OUTPUT"
          fi

      - name: 🛠️ 重新生成标准的 wrangler-action.toml / Generate config file
        working-directory: ./mail-worker
        run: |
          set -euo pipefail
          echo "📝 Generating wrangler-action.toml dynamically via Python..."
          python3 -c '
          import os

          def env(key, default=""):
              # 关键修复：统一 strip 首尾空白/换行，避免 Secret 里混入的
              # 隐藏换行符/空格破坏生成出来的 TOML 字符串语法
              return (os.environ.get(key) or default).strip()

          def env_raw_bool(key, default="false"):
              return env(key, default).lower()

          name = env("NAME", "cloud-mail")

          # 关键修复：以下绑定名(binding)和 [vars] 键名之前全部错误地用了
          # 大写(ADMIN/JWT_SECRET/DOMAIN/KV/DB/R2 等)。经过下载并全文检索
          # 项目源码(mail-worker/src)确认，代码里全部是小写读取，例如：
          #   c.env.admin / c.env.jwt_secret / c.env.domain
          #   c.env.ai_model / c.env.analysis_cache / c.env.orm_log
          #   c.env.kv / c.env.db / c.env.r2 / c.env.email(send_email绑定)
          #   c.env.project_link / c.env.linuxdo_client_id 等
          # 大写版本在代码里零匹配。之前哪怕部署"成功"，程序实际也读不到
          # 任何配置(admin/jwt_secret/kv/db 全部是 undefined)。这里统一
          # 改成小写，和官方 wrangler.toml 模板保持一致。
          #
          # [vars] 是 TOML 的一个表(table)，同一个表名只能出现一次，这里
          # 统一收集到 vars_lines 里最后只输出一次 "[vars]" 表头，避免
          # "trying to redefine an already defined table" 报错。
          vars_lines = [
              "admin = \"" + env("ADMIN") + "\"",
              "jwt_secret = \"" + env("JWT_SECRET") + "\"",
              "domain = " + env("DOMAIN", "[]"),
              "ai_model = \"" + env("AI_MODEL") + "\"",
              "analysis_cache = " + env_raw_bool("ANALYSIS_CACHE"),
          ]

          # orm_log：是否打印 SQL 日志，官方模板默认注释掉(即 false)，
          # 通过 Secret/Variable ORM_LOG 可选开启
          orm_log = env("ORM_LOG")
          if orm_log:
              vars_lines.append("orm_log = " + env_raw_bool("ORM_LOG"))

          proj_link = env("PROJECT_LINK")
          if proj_link:
              vars_lines.append("project_link = \"" + proj_link + "\"")

          l_id = env("LINUXDO_CLIENT_ID")
          l_sec = env("LINUXDO_CLIENT_SECRET")
          if l_id and l_sec:
              vars_lines.extend([
                  "linuxdo_client_id = \"" + l_id + "\"",
                  "linuxdo_client_secret = \"" + l_sec + "\"",
                  "linuxdo_callback_url = \"" + env("LINUXDO_CALLBACK_URL") + "\"",
                  "linuxdo_switch = " + env_raw_bool("LINUXDO_SWITCH"),
              ])

          # compatibility_date：官方模板当前使用 "2025-06-04"，可通过
          # Secret/Variable COMPATIBILITY_DATE 覆盖
          compat_date = env("COMPATIBILITY_DATE", "2025-06-04")

          toml = [
              "name = \"" + name + "\"",
              "main = \"src/index.js\"",
              "compatibility_date = \"" + compat_date + "\"",
              # keep_vars = true：官方模板自带，避免 wrangler 在部署时清空
              # 未在本地配置中出现、但远程已存在的 vars(双重保险)
              "keep_vars = true",
              "",
          ]

          # [observability]：官方模板默认开启，可通过 Secret/Variable
          # OBSERVABILITY_ENABLED 覆盖(默认 true)
          observability_enabled = env("OBSERVABILITY_ENABLED", "true")
          toml.extend([
              "[observability]",
              "enabled = " + observability_enabled.lower(),
              "",
          ])

          # [ai]：Workers AI 绑定，代码里用于识别验证码等功能，官方模板固定要求
          toml.extend([
              "[ai]",
              "binding = \"ai\"",
              "",
          ])

          toml.append("[vars]")
          toml.extend(vars_lines)
          toml.append("")

          toml.extend([
              "[[kv_namespaces]]",
              "binding = \"kv\"",
              "id = \"" + env("KV_ID") + "\"",
              "",
              "[[d1_databases]]",
              "binding = \"db\"",
              "database_name = \"" + name + "\"",
              "database_id = \"" + env("D1_ID") + "\"",
              ""
          ])

          custom_domain = env("CUSTOM_DOMAIN")
          if custom_domain:
              toml.extend(["[[routes]]", "pattern = \"" + custom_domain + "\"", "custom_domain = true", ""])

          r2_bucket = env("R2_BUCKET_NAME")
          if r2_bucket:
              toml.extend(["[[r2_buckets]]", "binding = \"r2\"", "bucket_name = \"" + r2_bucket + "\"", ""])

          if env_raw_bool("CLOUDFLARE_EMAIL") == "true":
              toml.extend(["[[send_email]]", "name = \"email\"", ""])

          # [assets]：静态前端资源绑定，官方模板固定要求，缺失会导致
          # index.js 里 `env.assets.fetch(req)` 报错(网站首页无法访问)
          toml.extend([
              "[assets]",
              "binding = \"assets\"",
              "directory = \"./dist\"",
              "not_found_handling = \"single-page-application\"",
              "run_worker_first = true",
              "",
          ])

          # [triggers]：定时任务。官方默认每天执行一次(每日重置/清理任务)。
          # 之前生成的 toml 完全没有这个块，导致每次部署都会把 Dashboard
          # 上已配置的 cron 触发器覆盖删除。这里通过 Secret/Variable
          # CRON_SCHEDULE 可自定义，支持逗号分隔多个 cron 表达式；
          # 默认沿用官方模板的 "0 16 * * *"(注意 index.js 里 scheduled()
          # 还专门判断了 "*/30 * * * *" 用于刷新图表缓存，如果你的账号
          # 也需要这个每 30 分钟的任务，记得把 CRON_SCHEDULE 设置为
          # "0 16 * * *,*/30 * * * *")
          cron_schedule = env("CRON_SCHEDULE", "0 16 * * *")
          cron_list = [c.strip() for c in cron_schedule.split(",") if c.strip()]
          if cron_list:
              cron_toml_array = "[" + ", ".join("\"" + c + "\"" for c in cron_list) + "]"
              toml.extend([
                  "[triggers]",
                  "crons = " + cron_toml_array,
                  "",
              ])

          with open("wrangler-action.toml", "w", encoding="utf-8") as f:
              f.write("\n".join(toml))

          print("✅ wrangler-action.toml generated.")
          '
          echo "----- wrangler-action.toml -----"
          cat wrangler-action.toml
          echo "---------------------------------"
        env:
          KV_ID: ${{ steps.kv_setup.outputs.kv_id }}
          D1_ID: ${{ steps.d1_setup.outputs.d1_id }}

      - name: 🚀 开始部署 / Start deployment
        id: deploy
        working-directory: ./mail-worker
        run: |
          # 关键修复：开启 pipefail，避免 `wrangler deploy | tee` 这种管道
          # 在 wrangler 报错退出时，因为 tee 本身返回 0 而被 shell 判定为"成功"
          set -eo pipefail

          echo "🚀 Starting deployment..."
          # 关键修复：这个项目源码里的 import 全部省略了文件扩展名
          # （例如 `import app from './hono/webs'`），这种写法依赖
          # esbuild 打包时自动解析。--no-bundle 会跳过打包，把源码当作
          # 严格 ES Module 直接部署，而严格 ESM 要求相对导入必须带精确
          # 扩展名，因此会报 "No such module" 错误。--no-bundle 在这里
          # 是用错了参数（它切换的是部署模式，不是"清缓存"），所以统一
          # 走正常的打包部署，不再区分 force_deploy。
          if [ "${{ github.event.inputs.force_deploy }}" = "true" ]; then
            echo "🔄 Force deploy requested."
          fi
          pnpm wrangler deploy -c wrangler-action.toml 2>&1 | tee deploy.log

          WORKER_URL=$(grep -o "https://.*\.workers\.dev" deploy.log || echo "")
          if [ -n "$WORKER_URL" ]; then
            echo "::add-mask::$WORKER_URL"
          fi
          echo "worker_url=$WORKER_URL" >> "$GITHUB_OUTPUT"
          echo "✅ Deployment completed successfully."

      - name: ♻️ 初始化数据库 / Initialize database
        run: |
          set -euo pipefail

          echo "🛠️ Starting database initialization..."
          sleep 15
          WORKER_URL="${CUSTOM_DOMAIN:+https://$CUSTOM_DOMAIN}"
          WORKER_URL="${WORKER_URL:-${{ steps.deploy.outputs.worker_url }}}"
          if [ -z "$WORKER_URL" ]; then
            echo "❌ Preview URL not available. Please set CUSTOM_DOMAIN."
            exit 1
          fi

          HTTP_CODE=$(curl -sL -w "%{http_code}" -o response.txt "$WORKER_URL/api/init/${JWT_SECRET}")
          RESPONSE_BODY=$(cat response.txt)
          if [ "$RESPONSE_BODY" = "success" ]; then
            echo "✅ Setup completed."
          else
            echo "❌ Failed. HTTP: $HTTP_CODE, Response: $RESPONSE_BODY"
            exit 1
          fi

      - name: 🗑️ 删除运行记录 / Delete workflow runs
        uses: GitRML/delete-workflow-runs@main
        continue-on-error: true
        with:
          retain_days: '1'
          keep_minimum_runs: '0'
